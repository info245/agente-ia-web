services:
  - type: web
    name: tmedia-global-ai
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx puppeteer browsers install chrome --path /opt/render/project/.cache/puppeteer
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: PORT
        value: 3000
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/.cache/puppeteer
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_PUBLIC_NUMBER
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v25.0
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: CHAT_HANDOFF_SECRET
        sync: false
      - key: TASK_SECRET
        sync: false
      - key: WHATSAPP_FOLLOWUP_HOURS
        value: 10
      - key: INTEGRATIONS_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LEADS_EMAIL_ENABLED
        sync: false
      - key: LEADS_EMAIL_TO
        sync: false
      - key: LEADS_EMAIL_FROM
        sync: false
      - key: LEADS_EMAIL_REPLY_TO
        sync: false
      - key: LEADS_CLIENT_EMAIL_ENABLED
        sync: false
      - key: LEADS_CLIENT_EMAIL_FROM
        sync: false
